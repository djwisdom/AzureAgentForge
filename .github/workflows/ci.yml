name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0 # full history so the history scan below is meaningful
      - name: gitleaks (working tree + history)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1
          ./gitleaks git . --config .gitleaks.toml --redact --exit-code 1
      - name: trufflehog (filesystem, verified only)
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog filesystem . --exclude-paths .trufflehog-exclude --fail --only-verified
      - name: internal-reference scan
        run: scripts/scan-internal-refs.sh

  build-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: validate upstream Dockerfile COPY sources resolve
        run: scripts/validate-build-context.sh

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
      - name: fmt
        run: terraform fmt -check -recursive infrastructure
      # terraform plan/apply are intentionally NOT in CI — they need Azure
      # credentials + a state backend. CI validates configuration.
      - name: validate
        working-directory: infrastructure/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: docker compose config
        run: docker compose config -q

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: bash syntax
        run: for f in scripts/*.sh; do bash -n "$f"; done
      - name: shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck --severity=error scripts/*.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: agent profiles
        run: |
          pip install -r agents/requirements-dev.txt
          python agents/validate_profiles.py
          pytest -q agents/tests
      - name: replay fixtures
        run: python tests/replay/validate_fixtures.py
      - name: model-router
        run: |
          pip install -r services/model-router/requirements.txt -r services/model-router/requirements-dev.txt
          pytest -q services/model-router/tests
      - name: forge console (installer)
        run: |
          pip install -r installer/requirements.txt pytest httpx
          pytest -q installer/tests
      - name: memory-governor
        run: |
          pip install -r services/memory-governor/requirements.txt pytest
          pytest -q tests/memory-governor
      - name: watchdog
        run: pytest -q services/watchdog/tests
      - name: compileall
        run: python -m compileall services installer
