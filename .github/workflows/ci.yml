name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
      - name: fmt
        run: terraform fmt -check -recursive infrastructure
      # terraform plan/apply are intentionally NOT in CI — they need Azure
      # credentials + a state backend. CI validates configuration.
      - name: validate
        working-directory: infrastructure/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: docker compose config
        run: docker compose config -q

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: agent profiles
        run: |
          pip install -r agents/requirements-dev.txt
          python agents/validate_profiles.py
          pytest -q agents/tests
      - name: replay fixtures
        run: python tests/replay/validate_fixtures.py
      - name: model-router
        run: |
          pip install -r services/model-router/requirements.txt -r services/model-router/requirements-dev.txt
          pytest -q services/model-router/tests
      - name: forge console (installer)
        run: |
          pip install -r installer/requirements.txt pytest httpx
          pytest -q installer/tests
      - name: compileall
        run: python -m compileall services installer
