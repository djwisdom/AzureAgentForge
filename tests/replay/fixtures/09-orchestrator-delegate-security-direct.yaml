fixture_id: 09-orchestrator-delegate-security-direct
description: >
  Single-specialist delegation: the Orchestrator routes a standalone security
  review/audit task DIRECTLY to the Security role — one child, no fan-out.

  Real-world scenario this models: an operator asks for a least-privilege audit
  of existing Azure IAM role assignments. There is no pending Terraform change
  and nothing to build — the request is purely "review this surface for
  security risks and report findings." The correct outcome is exactly one child
  issue assigned to Security, who is a READ-ONLY reviewer: it inspects,
  threat-models, and writes a findings report with severities and remediation
  steps — it does NOT itself apply, deploy, or commit any fix.

  Failure modes this fixture guards against, and why each is costly:
    - Mis-routing to Infrastructure (the orchestrator pattern-matches on "Azure
      IAM / role assignments" and treats this as an infra change). That hands a
      review task to a role that mutates state — the audit never happens and the
      operator gets a half-applied change instead of findings.
    - Expecting Security to make the fix itself (telling it to write Terraform,
      deploy a Container App, or modify role assignments). That collapses the
      review/remediate separation: the auditor becomes the implementer, losing
      the independent second pair of eyes and risking a destructive op against
      live IAM during what was supposed to be a read-only pass.
    - Fanning out to multiple specialists when one suffices, diluting ownership
      and producing duplicate or conflicting child issues.
    - Marking the parent done before the Security child exists (silent
      fabrication of a completed delegation).

input:
  channel: paperclip_issue
  assignee_agent: orchestrator
  title: "Audit current Azure IAM role assignments in azureagentforge-dev-rg for least-privilege"
  body: |
    Standalone security audit — not tied to any pending Terraform change.
    This is a review-only request: assess the current state and report
    findings. Do NOT apply, deploy, or modify any role assignments as part
    of this task — we just want the audit and the recommended fixes written
    up, and we'll action the remediation separately.

    Scope:

    - Every managed identity and service principal scoped to
      `azureagentforge-dev-rg`
    - Their effective role assignments (built-in roles + custom roles)
    - Whether each assignment is least-privilege for the workload

    Specific concerns to flag:

    - Any identity with `Owner` or `Contributor` at subscription or RG
      scope (default is bad — should be narrower)
    - Any identity with `Key Vault Secrets Officer` when only read
      access is needed (`Key Vault Secrets User` is sufficient)
    - Any cross-resource assignments where a service principal can
      reach resources outside its workload boundary

    Output: a findings report with severity ratings (Critical / High /
    Medium / Low), an attack-path analysis where findings chain, and
    remediation steps for each finding. Post it as a comment on this
    parent issue.

expected:
  parent:
    # Parent is fully delegated and closed out — the Orchestrator's own job here
    # is only to route, so once the child exists the parent should reach done.
    status: done
    # Guards against leaving the parent stuck mid-flight (delegation truncated /
    # the orchestrator stalled after creating, or instead of creating, the child).
    status_must_not_be: in_progress
    comment_count_min: 1
    # The summary comment must name the Security lane, proving the work was routed
    # to a security reviewer and not silently absorbed or sent elsewhere.
    summary_comment_must_reference: [security]
    # The wrap-up comment must link the child issue it created (no fabricated
    # "done" without a traceable child reference).
    summary_comment_must_include_child_refs: true

  children:
    # Single-specialist delegation: exactly one child, no fan-out.
    count: 1
    # That one child must be the Security role — and exactly one Security child.
    exactly_one_per_agent: [security]
    # Hard off-lane guard. Infrastructure especially must NOT receive this: the
    # task is a read-only review, not an infra change. Routing IAM-shaped review
    # work to a mutating role is the headline failure mode for this scenario.
    forbidden_agents: [coder, infrastructure, qa, cost-guardian, curator, researcher]

    by_agent:
      security:
        status: todo
        title_must_match: "(?i)(security|audit|iam|security|review|least.?privilege)"
        # The child must be wired to the parent issue, not orphaned.
        parent_id_set: true
        # Every term below must appear in the delegated child description, proving
        # the full scope and required outputs survived delegation intact (no
        # truncation / no role bleed dropping the security-specific framing).
        description_must_match_all:
          - "(?i)azureagentforge-dev-rg"
          - "(?i)managed identit"
          - "(?i)service principal"
          - "(?i)role assignment"
          - "(?i)least[- ]?privilege"
          - "Owner"
          - "Contributor"
          - "Key Vault Secrets Officer"
          - "Key Vault Secrets User"
          - "(?i)severity"
          - "(?i)attack[- ]?path"
          - "(?i)remediation"
          - "Acceptance criteria"
        # Off-lane guards: Security is a READ-ONLY reviewer. The delegated child
        # must NOT instruct it to build or change anything — only to review and
        # report. Any of these phrasings would mean the auditor was told to also
        # be the implementer, collapsing the review/remediate separation.
        description_must_not_match:
          - "(?i)write code"
          - "(?i)implement.*(function|module|handler|class|service)"
          - "(?i)(write|update|modify|create).*terraform"
          - "(?i)(deploy|configure|update|create).*container app"
          - "(?i)(write|create).*python"
          # Security writes remediation *steps*, it does not itself apply/deploy
          # the fix. Telling it to apply the change would mutate live IAM during
          # what must remain a read-only audit pass.
          - "(?i)(apply|deploy|push|commit).*(fix|remediation|change|role assignment)"
        # The child must carry explicit, checkable acceptance criteria so the
        # review has a defined "done" rather than an open-ended scan.
        description_must_contain: "Acceptance criteria"

negative_assertions:
  # Anti-fabrication: the parent cannot be reported done until the Security
  # child actually exists. Catches a "claimed success, never delegated" path.
  parent_must_not_be_marked_done_before_children_exist: true

timeouts:
  wait_for_completion_seconds: 240
  poll_interval_seconds: 5
  engagement_check_seconds: 60
  max_retries: 2

cleanup:
  cancel_after: true

trace_assertions:
  # The run must show both the delegation act and the parent-side bookkeeping.
  behavior_required:
    - create_child_issue_for_security
    - comment_parent_with_child_ref
  # Any one of these is an acceptable way to have created the Security child
  # (shell delegate helper, native tool call, or raw issues API POST).
  accepted_tool_patterns:
    - "pc-delegate\\.sh create-child .* --agent security"
    - "paperclip\\.create_child_issue.*security"
    - "POST .*companies/.*/issues.*security"
  forbidden_in_trace:
    # Must not stall on a routing/ownership dispute instead of just delegating.
    - "ownership conflict"
    # Must not wander into internal playbook paths that don't belong in this flow.
    - "/opt/data/skills/playbooks"
    # Hard off-lane guard at the tool level: the child must never be created for
    # any non-Security role — mirrors forbidden_agents above for the trace.
    - "pc-delegate\\.sh create-child .* --agent (coder|infrastructure|qa|cost-guardian|curator|researcher)"

trace_assertions_todo:
  # Anti-fabrication at the trace level: if the create-child call failed, the
  # run must not report the delegation as successful.
  must_not_claim_success_if_child_creation_failed: true
