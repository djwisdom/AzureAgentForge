fixture_id: 17-orchestrator-delegate-psychology-explicit
description: >
  Explicit-consent counterpart to the Psychology opt-in fixture (#16). The
  human-factors / Psychology lens is gated behind an opt-in guardrail: by
  default the Orchestrator must OFFER the lens and wait, never auto-route
  emotionally loaded or motivational content to the Psychology role on its
  own initiative. This fixture asserts the OTHER side of that guardrail —
  when the Operator EXPLICITLY asks for the human-factors lens ("apply the
  human-factors lens", "ask Psychology to help"), explicit consent flips the
  guardrail from "offer-and-wait" to "delegate." The Orchestrator must then
  create exactly one Psychology child issue and route the request there.

  Failure modes this guards against:
    - Over-correction: the Orchestrator clings to the opt-in barrier and
      re-offers the lens even though consent was already given explicitly,
      stalling a request the Operator clearly authorized.
    - Self-handling: the Orchestrator absorbs the reflective work into its
      own reply instead of delegating to the Psychology role, collapsing a
      specialist lane into the coordinator.
    - Role bleed / mis-route: the Orchestrator spawns the wrong specialist
      (Coder, Strategy, Coach, Business, ...) or more than one child, diluting
      a single-lane delegation into a fan-out.
    - Clinical drift: the Psychology child is framed as diagnosis/clinical
      assessment rather than a reflective human-factors lens (the role is a
      thinking partner, not a clinician) — see the must_not_match guards.

  Kept deliberately GENERIC: no real person, no personal details. The stimulus
  is a self-contained "apply the human-factors lens to X" decision-pressure
  scenario so the test exercises routing, not any individual's circumstances.

input:
  channel: paperclip_issue
  assignee_agent: orchestrator
  title: "Apply the human-factors lens: help me process a hard call before I decide"
  body: |
    Explicit invocation: please apply the human-factors lens to this and ask
    Psychology to help me think it through. I'm giving consent up front — I
    want this routed to the Psychology role, not handled at the coordinator
    level and not re-offered.

    Context for the Psychology lens: earlier this week a family member — my
    brother — pushed me, over a long call, to wind down the consultancy and
    take a "safer" salaried path "for stability." The case was made kindly,
    but I came off the conversation feeling smaller and less certain about
    the direction I'm on.
    I want to think out loud about why that framing landed so hard — not be
    talked out of the consultancy, and not get a strategy recommendation.

    Goal of the conversation: process the emotional weight of the call, name
    what I'm actually feeling, and separate that from the strategic question
    of whether the path is right. This is reflection and self-understanding,
    not a clinical assessment.

expected:
  parent:
    # Orchestrator delegated and closed the loop: the parent issue is resolved,
    # not left mid-flight. "done" (not in_progress) confirms the coordinator
    # finished its routing job rather than absorbing the work itself.
    status: done
    status_must_not_be: in_progress
    # At least one comment: the Orchestrator must report back on the parent
    # (what it routed and where), not silently spawn a child.
    comment_count_min: 1
    # The summary the Orchestrator leaves on the parent must name the lane it
    # delegated to — proves it routed to Psychology specifically, not vaguely.
    summary_comment_must_reference: [psychology]
    # Summary must link the child issue(s) it created — traceability from
    # parent to the delegated work.
    summary_comment_must_include_child_refs: true

  children:
    # Single-lane delegation: explicit consent authorizes exactly ONE child,
    # not a fan-out across specialists.
    count: 1
    # That one child must be owned by the Psychology role — the lens the
    # Operator explicitly invoked.
    exactly_one_per_agent: [psychology]
    # No other role may be spawned. Guards against mis-route / role bleed:
    # this is reflective human-factors work, not coding, infra, strategy, or
    # coaching, so none of those lanes should receive a child.
    forbidden_agents: [coder, infrastructure, qa, security, cost-guardian, curator, researcher, coach, business, planner, strategy]

    by_agent:
      psychology:
        # New child starts unstarted — the Orchestrator creates and assigns
        # it, it is not pre-completed or marked done by the coordinator.
        status: todo
        # Title must reflect the human-factors task (processing the call /
        # the emotional content), not some unrelated topic.
        title_must_match: "(?i)(psychology|process|emotional|conversation|brother|call)"
        # Child is linked back to the parent issue — delegation is traceable.
        parent_id_set: true
        # The delegated description must carry the full context forward so the
        # Psychology role can act without re-asking. Each term pins a piece of
        # the scenario the child must preserve:
        description_must_match_all:
          - "(?i)brother"                       # who the hard call was with
          - "(?i)call|conversation"             # the triggering interaction
          - "(?i)consultancy|consulting"        # the decision at stake
          - "(?i)process|reflect|think out loud" # the reflective mode requested
          - "(?i)feeling|emotional"             # the human-factors weight to work through
          - "Acceptance criteria"               # delegation is a well-formed, actionable task
        # Lane guards: the Psychology child must NOT drift into other roles'
        # work or into clinical territory.
        description_must_not_match:
          - "(?i)write code"                                  # not a coding task
          - "(?i)implement.*(function|module|handler|class|service)" # not engineering
          - "(?i)(write|update|modify|create).*terraform"     # not infra-as-code
          - "(?i)deploy"                                       # not an ops/deploy task
          - "(?i)diagnos|disorder|clinical"   # Psychology is a reflective lens, not a clinician
        # The delegated task is shaped as actionable work with explicit
        # acceptance criteria, not a vague hand-off.
        description_must_contain: "Acceptance criteria"

negative_assertions:
  # Ordering guard: the parent can only be marked done AFTER the Psychology
  # child exists — prevents claiming completion before the delegation happened
  # (silent self-handling dressed up as a routed-and-closed parent).
  parent_must_not_be_marked_done_before_children_exist: true

timeouts:
  wait_for_completion_seconds: 240
  poll_interval_seconds: 5
  engagement_check_seconds: 60
  max_retries: 2

cleanup:
  cancel_after: true

trace_assertions:
  # The trace must show the actual delegation happening, then the parent
  # being linked to it — both halves of a clean hand-off.
  behavior_required:
    - create_child_issue_for_psychology   # the Psychology child was actually created
    - comment_parent_with_child_ref       # the parent was updated to point at it
  # Any of these tool-call shapes is an acceptable way to create the
  # Psychology child (CLI delegate helper, SDK call, or raw issues API).
  accepted_tool_patterns:
    - "pc-delegate\\.sh create-child .* --agent psychology"
    - "paperclip\\.create_child_issue.*psychology"
    - "POST .*companies/.*/issues.*psychology"
  # Things that must NEVER appear in the trace:
  forbidden_in_trace:
    - "ownership conflict"                 # consent was explicit — no guardrail standoff
    - "/opt/data/skills/playbooks"         # no leaking internal skill/playbook paths
    # Critically: must not delegate to ANY non-Psychology lane. Catches the
    # mis-route failure mode at the tool-call level, not just the issue level.
    - "pc-delegate\\.sh create-child .* --agent (coder|infrastructure|qa|security|cost-guardian|curator|researcher|coach|business|planner|strategy)"

trace_assertions_todo:
  # Honesty guard: if child creation failed, the Orchestrator must NOT report
  # the delegation as successful — no silent fabrication of a routed outcome.
  must_not_claim_success_if_child_creation_failed: true
